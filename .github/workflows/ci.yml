name: CI — KidneyScan AI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r api/requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: false

  model-sanity-check:
    name: Model Sanity Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyTorch (CPU)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Verify model architecture
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from model.model import build_model, CLASS_NAMES
          m = build_model()
          total = sum(p.numel() for p in m.parameters())
          print(f'Classes : {CLASS_NAMES}')
          print(f'Params  : {total:,}')
          assert len(CLASS_NAMES) == 4, 'Expected 4 classes'
          assert total > 20_000_000, 'Unexpected parameter count'
          print('Model sanity check PASSED')
          "

      - name: Verify demo training (2 epochs)
        run: |
          python model/train.py --demo --epochs 2
